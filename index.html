<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1>Student Dashboard</h1>
        <button id="darkBtn">Dark Mode</button>
    </header>

    <section class="container">

        <div class="cards">
            <a href="audio.html" class="card">🎧 Audio Player</a>
            <a href="video.html" class="card">🎬 Video Player</a>
        </div>

        <h2>Weekly Timetable</h2>

        <table>
            <tr>
                <th>Day</th>
                <th>Subject</th>
                <th>Time</th>
                <th>Teacher</th>
            </tr>

            <tr>
                <td>Monday</td>
                <td>Math</td>
                <td>9:00 AM</td>
                <td>Sir Ali</td>
            </tr>
            <tr>
                <td>Tuesday</td>
                <td>English</td>
                <td>10:00 AM</td>
                <td>Miss Sara</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td>Computer</td>
                <td>11:00 AM</td>
                <td>Sir Ahmed</td>
            </tr>

        </table>

    </section>

    <script src="script.js"></script>
</body>

</html>
